<header class="site-header">

  <div class="wrapper">
    {%- assign default_paths = site.pages | map: "path" -%}
    {%- assign page_paths = site.header_pages | default: default_paths -%}
    {%- assign titles_size = site.pages | map: 'title' | join: '' | size -%}
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>

    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18px" height="18px" aria-hidden="true">
        <path fill="currentColor" d="M12 4.5a1 1 0 0 1-1-1V1a1 1 0 1 1 2 0v2.5a1 1 0 0 1-1 1Zm0 19a1 1 0 0 1-1-1V20.5a1 1 0 1 1 2 0V22a1 1 0 0 1-1 1ZM4.22 5.64a1 1 0 0 1-1.42 0L1.4 4.24A1 1 0 1 1 2.82 2.82l1.4 1.4a1 1 0 0 1 0 1.42Zm16.98 16.98a1 1 0 0 1-1.42 0l-1.4-1.4a1 1 0 1 1 1.42-1.42l1.4 1.4a1 1 0 0 1 0 1.42ZM3 13H1a1 1 0 1 1 0-2h2a1 1 0 1 1 0 2Zm22 0h-2a1 1 0 1 1 0-2h2a1 1 0 1 1 0 2ZM4.22 20.36a1 1 0 0 1 0-1.42l1.4-1.4a1 1 0 1 1 1.42 1.42l-1.4 1.4a1 1 0 0 1-1.42 0ZM19.78 5.64a1 1 0 0 1 0-1.42l1.4-1.4A1 1 0 1 1 22.6 4.24l-1.4 1.4a1 1 0 0 1-1.42 0ZM12 18a6 6 0 1 1 0-12 6 6 0 0 1 0 12Z"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18px" height="18px" aria-hidden="true">
        <path fill="currentColor" d="M20.742 13.045a8.088 8.088 0 0 1-2.077.271c-4.406 0-7.98-3.574-7.98-7.98 0-1.406.365-2.727 1.003-3.874a.75.75 0 0 0-.847-1.089A10.03 10.03 0 0 0 3 10.5C3 16.299 7.701 21 13.5 21a10.03 10.03 0 0 0 9.127-5.841.75.75 0 0 0-.885-.114 8.05 8.05 0 0 1-1 0Z"/>
      </svg>
    </button>

    {%- if titles_size > 0 -%}
      <nav class="site-nav">
        <input type="checkbox" id="nav-trigger" class="nav-trigger" />
        <label for="nav-trigger">
          <span class="menu-icon">
            <svg viewBox="0 0 18 15" width="18px" height="15px">
              <path d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516L18,7.516z M18,13.516C18,14.335,17.335,15,16.516,15H1.484 C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.483,1.484-1.483h15.032C17.335,12.031,18,12.695,18,13.516L18,13.516z"/>
            </svg>
          </span>
        </label>

        <!--div class="trigger">
          {%- for path in page_paths -%}
            {%- assign my_page = site.pages | where: "path", path | first -%}
            {%- if my_page.title -%}
            <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
            {%- endif -%}
          {%- endfor -%}
        </div-->
      </nav>
    {%- endif -%}
  </div>
</header>

<script>
  (function () {
    var btn = document.getElementById('theme-toggle');
    if (!btn) return;
    btn.addEventListener('click', function () {
      var root = document.documentElement;
      var next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      root.setAttribute('data-theme', next);
      try { localStorage.setItem('theme', next); } catch (e) {}
    });
  })();
</script>
